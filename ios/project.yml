name: OpenMatch
options:
  bundleIdPrefix: app.openmatch
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES

configs:
  Debug: debug
  Release: release

targets:
  OpenMatch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - OpenMatch
    info:
      path: OpenMatch/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: "OpenMatch uses your location to show profiles nearby. Your exact location is never shared with other users."
        NSCameraUsageDescription: "OpenMatch uses the camera so you can add profile photos."
        NSPhotoLibraryUsageDescription: "OpenMatch uses your photo library so you can add profile photos."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openmatch.ios
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO

  OpenMatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OpenMatchTests
    dependencies:
      - target: OpenMatch

  OpenMatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - OpenMatchUITests
    dependencies:
      - target: OpenMatch

schemes:
  OpenMatch:
    build:
      targets:
        OpenMatch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OpenMatchTests
        - OpenMatchUITests
