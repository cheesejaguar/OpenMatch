name: OpenMatch
options:
  bundleIdPrefix: app.openmatch
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configs:
  Debug: debug
  Release: release

packages:
  Ably:
    url: https://github.com/ably/ably-cocoa
    from: "1.2.30"

targets:
  OpenMatch:
    type: application
    platform: iOS
    sources:
      - OpenMatch
    dependencies:
      - package: Ably
        product: Ably
    info:
      path: OpenMatch/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: "OpenMatch uses your location to show profiles nearby. Your exact location is never shared with other users."
        NSCameraUsageDescription: "OpenMatch uses the camera so you can add profile photos."
        NSPhotoLibraryUsageDescription: "OpenMatch uses your photo library so you can add profile photos."
        ITSAppUsesNonExemptEncryption: false
        # OpenMatch does NOT track. We do not call
        # ATTrackingManager.requestTrackingAuthorization(). The Privacy
        # Manifest (PrivacyInfo.xcprivacy) declares this explicitly.
        # We do not include NSUserTrackingUsageDescription because it
        # would be misleading to declare a tracking purpose we never
        # exercise.
        #
        # Required Reason API justifications also live in the Privacy
        # Manifest, not here.
        LSApplicationCategoryType: "public.app-category.social-networking"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openmatch.ios
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO

  OpenMatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OpenMatchTests
    dependencies:
      - target: OpenMatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openmatch.ios.tests

  OpenMatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - OpenMatchUITests
    dependencies:
      - target: OpenMatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openmatch.ios.uitests

schemes:
  OpenMatch:
    build:
      targets:
        OpenMatch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OpenMatchTests
        - OpenMatchUITests
