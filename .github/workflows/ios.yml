name: iOS

on:
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-and-test:
    name: xcodebuild build + test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: swiftpm-${{ runner.os }}-${{ hashFiles('ios/project.yml') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Generate Xcode project
        working-directory: ios
        run: make generate

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Build (iPhone 15 simulator)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project OpenMatch.xcodeproj \
            -scheme OpenMatch \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify || xcodebuild \
            -project OpenMatch.xcodeproj \
            -scheme OpenMatch \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project OpenMatch.xcodeproj \
            -scheme OpenMatch \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            test
