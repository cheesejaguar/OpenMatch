name: iOS

on:
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-and-test:
    name: xcodebuild build + test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: swiftpm-${{ runner.os }}-${{ hashFiles('ios/project.yml') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Generate Xcode project
        working-directory: ios
        run: make generate

      # The simulator name on macos-latest changes with each Xcode release
      # (iPhone 15 → iPhone 16 → ...). Resolve the newest available iPhone
      # simulator dynamically so this workflow doesn't break when GitHub
      # rolls a new image.
      - name: Resolve iPhone simulator
        id: sim
        run: |
          xcrun simctl list devices available
          DEVICE=$(xcrun simctl list devices available -j \
            | python3 -c '
          import json, sys, re
          data = json.load(sys.stdin)
          best = None
          best_num = -1
          for runtime, devs in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for d in devs:
                  name = d.get("name", "")
                  m = re.match(r"^iPhone (\d+)(?:\s|$)", name)
                  if not m or not d.get("isAvailable", True):
                      continue
                  num = int(m.group(1))
                  if num > best_num:
                      best_num = num
                      best = name
          print(best or "iPhone 15")
          ')
          echo "Selected simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: ios
        env:
          DEVICE: ${{ steps.sim.outputs.device }}
        run: |
          set -o pipefail
          xcodebuild \
            -project OpenMatch.xcodeproj \
            -scheme OpenMatch \
            -destination "platform=iOS Simulator,name=$DEVICE,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        working-directory: ios
        env:
          DEVICE: ${{ steps.sim.outputs.device }}
        run: |
          set -o pipefail
          xcodebuild \
            -project OpenMatch.xcodeproj \
            -scheme OpenMatch \
            -destination "platform=iOS Simulator,name=$DEVICE,OS=latest" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test
